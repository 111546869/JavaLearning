spring.application.name=demo

# --- Dify agent settings ---
# Configure the Dify API endpoint, API key and optional model.
# Example:
dify.api.url=https://api.dify.ai/v1
# don't store key in repo; prefer environment variable
dify.api.key=${DIFY_API_KEY:}
dify.model=gpt-4o-mini

# When using Dify streaming, set stream=true in the request payload. The service will
# forward raw chunks to connected SSE clients. Adjust the payload template in DifyService
# if your Dify instance expects a different JSON shape.

